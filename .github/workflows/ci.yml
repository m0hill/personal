name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install nub
        run: |
          curl -fsSL https://nubjs.com/install.sh | bash
          echo "$HOME/.nub/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: nub ci

      - name: Check
        run: nub run check
